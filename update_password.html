<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password – Net Pacific</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%232563eb%27/%3E%3Ctext x=%2716%27 y=%2721.5%27 font-family=%27Arial,sans-serif%27 font-size=%2711%27 font-weight=%27bold%27 fill=%27white%27 text-anchor=%27middle%27%3ENPI%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
    <style>
        body.login-page {
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 1.5rem;
        }
        .login-page .login-bg {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            z-index: 0;
        }
        .login-page .login-bg::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.25), transparent),
                        radial-gradient(ellipse 60% 40% at 90% 50%, rgba(16, 185, 129, 0.15), transparent),
                        radial-gradient(ellipse 50% 30% at 10% 80%, rgba(245, 158, 11, 0.12), transparent),
                        radial-gradient(ellipse 70% 50% at 50% 100%, rgba(139, 92, 246, 0.1), transparent);
            animation: loginGlow 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .login-page .login-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(59, 130, 246, 0.03) 50%, transparent 100%);
            pointer-events: none;
        }
        @keyframes loginGlow {
            from { opacity: 0.8; transform: scale(1); }
            to { opacity: 1; transform: scale(1.05); }
        }
        .login-page .login-card-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            border-radius: 1.25rem;
            background: rgba(30, 41, 59, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .login-page .login-card-inner { padding: 1.75rem 1.5rem 1.5rem; }
        .login-page .login-card-logo { text-align: center; margin-bottom: 1.25rem; }
        .login-page .login-card-logo img { height: 2.75rem; width: auto; display: inline-block; }
        .login-page .login-hero {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-align: center;
        }
        .login-page .login-subtitle-text {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-page .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.375rem;
        }
        .login-page .form-input-new {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 0.75rem;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.9375rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .login-page .form-input-new::placeholder { color: rgba(255, 255, 255, 0.4); }
        .login-page .form-input-new:focus {
            outline: none;
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .login-page .password-wrap { position: relative; margin-bottom: 1rem; }
        .login-page .password-wrap .form-input-new { margin-bottom: 0; }
        .login-page .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 0.25rem;
        }
        .login-page .password-toggle .material-icons { font-size: 1.25rem; }
        .login-page .btn-signin {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: none;
            border-radius: 0.75rem;
            background: rgba(248, 250, 252, 0.95);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
        }
        .login-page .btn-signin:hover:not(:disabled) {
            background: #fff;
            transform: translateY(-1px);
        }
        .login-page .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-page .login-create {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }
        .login-page .login-create a {
            color: #93c5fd;
            text-decoration: none;
        }
        .login-page .login-create a:hover { text-decoration: underline; }
        .login-page .theme-toggle-wrap {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            font-size: 0.8125rem;
            font-family: inherit;
        }
        .login-page .theme-toggle-wrap:hover { background: rgba(255, 255, 255, 0.1); }
        .login-page .form-hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }
        .login-page .error-message,
        .login-page .success-message {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .login-page .error-message {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(248, 113, 113, 0.4);
            color: #fca5a5;
        }
        .login-page .success-message {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(74, 222, 128, 0.4);
            color: #86efac;
        }
        .login-page .error-message.hidden,
        .login-page .success-message.hidden { display: none !important; }
        @media (max-width: 480px) {
            .login-page .login-card-inner { padding: 1.25rem 1rem; }
        }
        /* Dark mode */
        html.dark .login-page .login-bg { background: #0a0a0f; }
        html.dark .login-page .login-card-wrap {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.08);
        }
        html.dark .login-page .theme-toggle-wrap {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }
        /* Light mode */
        html:not(.dark) .login-page .login-bg { background: linear-gradient(160deg, #1e3a8a 0%, #312e81 50%, #1e293b 100%); }
        html:not(.dark) .login-page .login-bg::before {
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 255, 255, 0.12), transparent),
                        radial-gradient(ellipse 60% 40% at 90% 50%, rgba(147, 197, 253, 0.15), transparent);
        }
        html:not(.dark) .login-page .login-card-wrap {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(30, 58, 138, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        html:not(.dark) .login-page .login-hero { color: #1e293b; }
        html:not(.dark) .login-page .login-subtitle-text { color: #475569; }
        html:not(.dark) .login-page .form-label { color: #334155; }
        html:not(.dark) .login-page .form-input-new {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #1e293b;
        }
        html:not(.dark) .login-page .form-input-new::placeholder { color: #94a3b8; }
        html:not(.dark) .login-page .form-input-new:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        html:not(.dark) .login-page .form-hint { color: #64748b; }
        html:not(.dark) .login-page .login-create { color: #475569; }
        html:not(.dark) .login-page .btn-signin {
            background: #1e40af;
            color: #fff;
        }
        html:not(.dark) .login-page .btn-signin:hover:not(:disabled) {
            background: #1d4ed8;
            color: #fff;
        }
        html:not(.dark) .login-page .theme-toggle-wrap {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(30, 58, 138, 0.2);
            color: #1e293b;
        }
        html:not(.dark) .login-page .theme-toggle-wrap:hover { background: #fff; }
        html:not(.dark) .login-page .login-card-logo img { filter: brightness(0); }
        html:not(.dark) .login-page .password-toggle { color: #64748b; }
        html:not(.dark) .login-page .error-message { background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.3); color: #b91c1c; }
        html:not(.dark) .login-page .success-message { background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3); color: #15803d; }
    </style>
</head>
<body class="login-page">
    <div class="login-bg" aria-hidden="true"></div>

    <button id="themeToggle" class="theme-toggle-wrap" type="button" title="Toggle dark/light mode" aria-label="Toggle dark/light mode">
        <span class="material-icons" style="font-size:1.25rem;">wb_sunny</span>
        <span id="themeToggleLabel">Light</span>
    </button>

    <div class="login-card-wrap">
        <div class="login-card-inner">
            <div class="login-card-logo">
                <img id="pageLogo" src="assets/netpacific-logo.png" alt="Net Pacific">
            </div>
            <h2 class="login-hero">Change Your Password</h2>
            <p class="login-subtitle-text">Enter your current password and choose a new one.</p>

            <form id="updatePasswordForm">
                <div id="formMessage" class="error-message hidden" role="alert"></div>
                <div id="formSuccess" class="success-message hidden" role="status"></div>

                <label for="currentPassword" class="form-label">Current Password</label>
                <div class="password-wrap">
                    <input type="password" id="currentPassword" name="currentPassword" required class="form-input-new" placeholder="Enter current password" autocomplete="current-password">
                    <button type="button" id="toggleCurrent" class="password-toggle" aria-label="Show password"><span class="material-icons">visibility</span></button>
                </div>

                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required minlength="8" maxlength="100" class="form-input-new" placeholder="Min 8 characters" autocomplete="new-password">
                <p class="form-hint">Password must be 8–100 characters long.</p>

                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <div class="password-wrap">
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" maxlength="100" class="form-input-new" placeholder="Confirm new password" autocomplete="new-password">
                    <button type="button" id="toggleConfirm" class="password-toggle" aria-label="Show password"><span class="material-icons">visibility</span></button>
                </div>

                <button type="submit" class="btn-signin">Update Password</button>
            </form>

            <p class="login-create" style="margin-top:1.25rem;">
                <a href="login.html">Back to Sign in</a>
            </p>
        </div>
    </div>

    <script>
    (function() {
        const getApiUrl = function(path) {
            if (typeof window.APP_CONFIG !== 'undefined' && window.APP_CONFIG.API_BASE_URL)
                return window.APP_CONFIG.API_BASE_URL + path;
            var base = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:3000' : '';
            return base + path;
        };

        // Only admin can change password: require logged-in Admin or System Admin
        (function requireAdminForPasswordPage() {
            var token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            try {
                var payload = JSON.parse(atob(token.split('.')[1]));
                var accountType = (payload.accountType || payload.account_type || '').toString();
                if (accountType !== 'Admin' && accountType !== 'System Admin') {
                    window.location.href = 'login.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        })();

        // Theme (match login page)
        function applyTheme(theme) {
            var isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            var themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                var icon = themeToggle.querySelector('.material-icons');
                if (icon) icon.textContent = isDark ? 'wb_sunny' : 'dark_mode';
                var label = document.getElementById('themeToggleLabel');
                if (label) label.textContent = isDark ? 'Light' : 'Dark';
            }
            var logo = document.getElementById('pageLogo');
            if (logo) logo.src = 'assets/netpacific-logo.png';
        }
        function toggleTheme() {
            var current = localStorage.getItem('theme') || 'light';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }
        document.addEventListener('DOMContentLoaded', function() {
            var saved = localStorage.getItem('theme') || 'light';
            applyTheme(saved);
            var themeToggle = document.getElementById('themeToggle');
            if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
        });
        window.addEventListener('storage', function(e) {
            if (e.key === 'theme') applyTheme(e.newValue || 'light');
        });

        // Password visibility toggles
        function setupToggle(inputId, btnId) {
            var input = document.getElementById(inputId);
            var btn = document.getElementById(btnId);
            if (!input || !btn) return;
            btn.addEventListener('click', function() {
                var isPw = input.type === 'password';
                input.type = isPw ? 'text' : 'password';
                btn.querySelector('.material-icons').textContent = isPw ? 'visibility_off' : 'visibility';
                btn.setAttribute('aria-label', isPw ? 'Hide password' : 'Show password');
            });
        }
        setupToggle('currentPassword', 'toggleCurrent');
        setupToggle('confirmPassword', 'toggleConfirm');

        // Form submit
        document.getElementById('updatePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var currentPassword = document.getElementById('currentPassword').value;
            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var messageDiv = document.getElementById('formMessage');
            var successDiv = document.getElementById('formSuccess');
            messageDiv.classList.add('hidden');
            messageDiv.textContent = '';
            successDiv.classList.add('hidden');
            successDiv.textContent = '';

            if (newPassword.length < 8) {
                messageDiv.textContent = 'New password must be at least 8 characters.';
                messageDiv.classList.remove('hidden');
                return;
            }
            if (newPassword.length > 100) {
                messageDiv.textContent = 'New password must be no more than 100 characters.';
                messageDiv.classList.remove('hidden');
                return;
            }
            if (newPassword !== confirmPassword) {
                messageDiv.textContent = 'New passwords do not match.';
                messageDiv.classList.remove('hidden');
                return;
            }
            try {
                var res = await fetch(getApiUrl('/api/update-password'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + (localStorage.getItem('authToken') || '')
                    },
                    body: JSON.stringify({ currentPassword: currentPassword, newPassword: newPassword })
                });
                var data = await res.json();
                if (res.ok) {
                    successDiv.textContent = 'Password updated successfully! Redirecting...';
                    successDiv.classList.remove('hidden');
                    document.getElementById('updatePasswordForm').reset();
                    setTimeout(function() { window.location.href = 'index.html'; }, 2000);
                } else {
                    if (data.errors && Array.isArray(data.errors)) {
                        messageDiv.textContent = data.errors.map(function(e) { return e.msg; }).join(' ');
                    } else {
                        messageDiv.textContent = data.error || data.message || 'Failed to update password.';
                    }
                    messageDiv.classList.remove('hidden');
                }
            } catch (err) {
                messageDiv.textContent = 'An error occurred. Please try again.';
                messageDiv.classList.remove('hidden');
            }
        });
    })();
    </script>
</body>
</html>
